name: Release

# Tagging vX.Y.Z builds the SPA, embeds it, and publishes a single self-contained
# `chess-base` binary per desktop platform to the GitHub Release for that tag.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: 4

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # rust-embed bakes frontend/dist into the binary at compile time, so the
      # SPA must exist before `cargo build`.
      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Build binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          name="chess-base-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/chess-base" "dist/$name/"
          cp README.md "dist/$name/"
          tar -C dist -czf "dist/$name.tar.gz" "$name"
          echo "ASSET=dist/$name.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          name="chess-base-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/chess-base.exe" "dist/$name/"
          cp README.md "dist/$name/"
          7z a "dist/$name.zip" "./dist/$name"
          echo "ASSET=dist/$name.zip" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
          body: |
            Self-contained `chess-base` binaries (embedded SPA). Download the
            archive for your platform, extract it, and run the binary — it starts
            in **local mode**, creates the SQLite database, and opens your browser.
